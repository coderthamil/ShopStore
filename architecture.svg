<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Definitions for Markers and Gradients -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#fbbf24"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d0e15" rx="15"/>

  <!-- Connections / Lines -->
  <!-- Client to Router -->
  <path d="M 400,105 L 400,155" fill="none" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="410" y="135" fill="#a78bfa" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">API Requests</text>

  <!-- Client to Demo Mode (Dashed) -->
  <path d="M 270,80 L 170,80 L 170,155" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <text x="100" y="115" fill="#fbbf24" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Offline Fallback</text>

  <!-- Router to Security -->
  <path d="M 330,205 L 220,205 L 220,285" fill="none" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
  <text x="140" y="245" fill="#22d3ee" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Auth Check</text>

  <!-- Router to DB -->
  <path d="M 470,205 L 580,205 L 580,285" fill="none" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
  <text x="590" y="245" fill="#22d3ee" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Yield Session</text>

  <!-- DB to Postgres -->
  <path d="M 580,345 L 580,395" fill="none" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="590" y="375" fill="#34d399" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Execute SQL</text>


  <!-- Nodes -->
  
  <!-- 1. Client (Vite + React SPA) -->
  <g filter="url(#shadow)">
    <rect x="270" y="45" width="260" height="60" rx="10" fill="#8b5cf6" stroke="#c084fc" stroke-width="2"/>
    <text x="400" y="72" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">💻 Client (Vite + React SPA)</text>
    <text x="400" y="90" fill="#ddd" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">Glassmorphic Dashboard UI</text>
  </g>

  <!-- 2. FastAPI APIRouter -->
  <g filter="url(#shadow)">
    <rect x="270" y="160" width="260" height="60" rx="10" fill="#06b6d4" stroke="#22d3ee" stroke-width="2"/>
    <text x="400" y="187" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">⚡ FastAPI APIRouter</text>
    <text x="400" y="205" fill="#ddd" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">Asynchronous Endpoint Handlers</text>
  </g>

  <!-- 3. Security (JWT / Bcrypt) -->
  <g filter="url(#shadow)">
    <rect x="90" y="290" width="260" height="60" rx="10" fill="#ec4899" stroke="#f472b6" stroke-width="2"/>
    <text x="220" y="317" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">🔑 Auth &amp; Security</text>
    <text x="220" y="335" fill="#ddd" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">JWT Signatures &amp; bcrypt Salting</text>
  </g>

  <!-- 4. DB Session (SQLAlchemy) -->
  <g filter="url(#shadow)">
    <rect x="450" y="290" width="260" height="60" rx="10" fill="#10b981" stroke="#34d399" stroke-width="2"/>
    <text x="580" y="317" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">🗄️ DB Session (SQLAlchemy)</text>
    <text x="580" y="335" fill="#ddd" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">Scoped Object Relational Mapper</text>
  </g>

  <!-- 5. PostgreSQL Engine -->
  <g filter="url(#shadow)">
    <rect x="450" y="400" width="260" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="580" y="427" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">🐘 PostgreSQL Engine</text>
    <text x="580" y="445" fill="#ddd" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">Relational Database Store</text>
  </g>

  <!-- 6. Demo Mode Simulator -->
  <g filter="url(#shadow)">
    <rect x="40" y="160" width="200" height="60" rx="10" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
    <text x="140" y="187" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">🎮 Demo Mode</text>
    <text x="140" y="205" fill="#ddd" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">In-Memory Mock State</text>
  </g>
</svg>
